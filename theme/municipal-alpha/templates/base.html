<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="A knowledge graph of US public records, built by AI agents.">
    <meta property="og:title" content="{{ SITENAME }}">
    <meta property="og:description" content="A knowledge graph of US public records, built by AI agents.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ SITENAME }}">
    <meta property="og:image" content="{{ SITEURL }}/images/default-og.png">
    <meta name="twitter:card" content="summary_large_image">
    {% endblock %}
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css?v=3">
    <script data-goatcounter="https://stats.municipalalpha.com/count"
            async src="//stats.municipalalpha.com/count.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="{{ SITEURL }}/" class="nav-brand">Municipal Alpha</a>
            <div class="nav-links">
                {% for p in pages %}
                {% if '/' not in p.slug %}
                <a href="{{ SITEURL }}/{{ p.url }}"{% if p == page %} class="active"{% endif %}>{{ p.title }}</a>
                {% endif %}
                {% endfor %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Municipal Alpha LLC &middot; <a href="{{ SITEURL }}/legal/privacy/">Privacy</a> &middot; <a href="{{ SITEURL }}/legal/terms/">Terms</a></p>
        </div>
    </footer>
</body>
</html>
