<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="Precursor intelligence from US public records. You see the thing before it becomes a thing.">
    <meta property="og:title" content="{{ SITENAME }}">
    <meta property="og:description" content="Precursor intelligence from US public records. You see the thing before it becomes a thing.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ SITENAME }}">
    <meta property="og:image" content="{{ SITEURL }}/images/default-og.png">
    <meta name="twitter:card" content="summary_large_image">
    {% endblock %}
    <link rel="icon" type="image/png" href="{{ SITEURL }}/images/icon-square-dark.png">
    <link rel="apple-touch-icon" href="{{ SITEURL }}/images/icon-square-dark.png">
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css?v=4">
    <script data-goatcounter="https://stats.municipalalpha.com/count"
            async src="//stats.municipalalpha.com/count.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="{{ SITEURL }}/" class="nav-brand"><img src="{{ SITEURL }}/images/wordmark-nav.png" alt="municipαl" style="height: 32px; vertical-align: middle;"></a>
            <div class="nav-links">
                {% for p in pages %}
                {% if p.slug in ['solutions', 'data-stories', 'towns', 'how-it-works', 'contact'] %}
                <a href="{{ SITEURL }}/{{ p.url }}"{% if p == page %} class="active"{% endif %}>{{ p.title }}</a>
                {% endif %}
                {% endfor %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p><a href="{{ SITEURL }}/about/">About</a> &middot; <a href="{{ SITEURL }}/methodology/">Methodology</a> &middot; <a href="{{ SITEURL }}/legal/privacy/">Privacy</a> &middot; <a href="{{ SITEURL }}/legal/terms/">Terms</a></p>
            <p>&copy; 2026 Municipal Alpha LLC</p>
        </div>
    </footer>
</body>
</html>
