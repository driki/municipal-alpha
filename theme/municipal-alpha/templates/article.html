{% extends "base.html" %}

{% block title %}{{ article.title }} — {{ SITENAME }}{% endblock %}

{% block content %}
<article class="page">
    <div class="container">
        <h1>{{ article.title }}</h1>
        <time datetime="{{ article.date.isoformat() }}">{{ article.locale_date }}</time>
        {{ article.content }}
    </div>
</article>
{% endblock %}
