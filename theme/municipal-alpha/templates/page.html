{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ SITENAME }}{% endblock %}

{% block meta %}
    <meta name="description" content="{{ page.summary|default('A knowledge graph of US public records, built by AI agents.', true)|striptags|e }}">
    <meta property="og:title" content="{{ page.title|e }}">
    <meta property="og:description" content="{{ page.summary|default('A knowledge graph of US public records, built by AI agents.', true)|striptags|e }}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="{{ SITENAME }}">
    {% if page.header_image %}
    <meta property="og:image" content="{{ SITEURL }}/images/{{ page.header_image }}">
    {% else %}
    <meta property="og:image" content="{{ SITEURL }}/images/default-og.png">
    {% endif %}
    <meta name="twitter:card" content="summary_large_image">
{% endblock %}

{% block content %}
<section class="page">
    <div class="container">
        {% if page.header_image %}
        <img src="{{ SITEURL }}/images/{{ page.header_image }}" alt="{{ page.title }}" class="story-header-image">
        {% endif %}
        <h1>{{ page.title }}</h1>
        {{ page.content }}
    </div>
</section>
{% endblock %}
